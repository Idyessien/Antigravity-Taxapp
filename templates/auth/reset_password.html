{% extends "base.html" %}
{% block guest_content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-light text-success rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock fs-3"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Create New Password</h3>
                    <p class="text-muted">Choose a strong, secure password for your account.</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">New Password</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required minlength="6" placeholder="••••••••">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control form-control-lg bg-light border-0" required minlength="6" placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
