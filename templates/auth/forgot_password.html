{% extends "base.html" %}
{% block guest_content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-light text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-key-fill fs-3"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Reset Password</h3>
                    <p class="text-muted">Enter your email address and we'll send you a secure link to reset your password.</p>
                </div>
                
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg bg-light border-0" required placeholder="name@example.com">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-4 shadow-sm">Send Reset Link</button>
                    
                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none text-muted fw-bold">
                            <i class="bi bi-arrow-left me-1"></i> Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
