{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Monthly Budgets</h2>
    <p>Set a monthly spending limit for each category.</p>

    <form method="POST">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Group</th>
                    <th>Monthly Limit (₦)</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categories %}
                <tr>
                    <td>{{ cat.name }}</td>
                    <td><span class="badge bg-secondary">{{ cat.group }}</span></td>
                    <td>
                        <input type="number" step="0.01" class="form-control" name="limit_{{ cat.id }}"
                            value="{{ budget_map.get(cat.id, 0.0) }}">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button type="submit" class="btn btn-success mb-5">Update Budgets</button>
    </form>
</div>
{% endblock %}
